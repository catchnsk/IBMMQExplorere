server:
  port: 8080
  servlet:
    session:
      timeout: 30m

spring:
  application:
    name: ibm-mq-explorer

  datasource:
    url: jdbc:h2:file:./data/mqexplorer;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false

app:
  encryption:
    secret-key: ${MQ_ENCRYPTION_KEY:DefaultDevKey32CharsChange!!}

  security:
    admin-username: ${ADMIN_USERNAME:admin}
    admin-password: ${ADMIN_PASSWORD:admin123}
    viewer-username: ${VIEWER_USERNAME:viewer}
    viewer-password: ${VIEWER_PASSWORD:viewer123}

  mq:
    connection-timeout-seconds: 30
    browse-max-messages: 500
    session-idle-timeout-minutes: 30

logging:
  level:
    com.ibmexplorer: INFO
    com.ibm.mq: WARN
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
